<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="stylesheet" href="../assets/css/responsividade.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="auth-container">
  <h2>Cadastre - se</h2>

  <input type="text" id="nome" placeholder="Nome">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" class="input-senha" placeholder="Senha">
  <input type="password"  id="confirmarSenha" placeholder="Confirmar senha">

<!-- REQUISITOS -->
<div class="password-rules">
  <p id="rule-length">• Mínimo 8 caracteres</p>
  <p id="rule-upper">• Letra maiúscula</p>
  <p id="rule-number">• Número</p>
  <p id="rule-special">• Caractere especial</p>
</div>

  <button onclick="cadastrar()">Cadastrar</button>

  <p>Já tem conta? <a href="login.html">Login</a></p>
</div> <!--  FECHAMENTO CORRETO -->

<!-- LOADER GLOBAL (FORA DO CONTAINER) -->
<div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div>

<!-- TOAST (FORA DO CONTAINER) -->
<div id="toast" class="toast"></div>

<button id="button-back" onclick="goBack()">Voltar</button>


<script src="../assets/js/env.js"></script>
<script src="../assets/js/githubApi.js"></script>
<script src="../assets/js/auth.js"></script>

<script>ativarEnter(cadastrar);</script>

</body>
</html>
